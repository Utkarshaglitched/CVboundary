<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surveillance Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/css/style.css" rel="stylesheet" />
</head>
<body>
  <div class="dashboard-shell">
    <header class="dashboard-topbar">
      <h1>Live Monitoring</h1>
      <nav class="dashboard-nav">
        <a class="btn btn-sm btn-primary" href="/">Live</a>
        <a class="btn btn-sm btn-outline-light" href="/logs">Intrusion Logs</a>
        <a class="btn btn-sm btn-outline-light" href="/settings">Settings</a>
      </nav>
      <div class="dashboard-stats">
        <span>Camera: <strong>{{ camera_status }}</strong></span>
        <span>Today: <strong>{{ intrusions_today }}</strong></span>
        <span>Status: <strong>{{ system_status }}</strong></span>
      </div>
    </header>
    <div class="stream-viewport">
      <img src="/video_feed" alt="Live video stream" />
    </div>
  </div>
</body>
</html>
