<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surveillance Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/css/style.css" rel="stylesheet" />
</head>
<body>
  <div class="container-fluid">
    <div class="row min-vh-100">
      <aside class="col-md-3 col-lg-2 bg-dark py-4 border-end">
        <h3 class="text-white mb-4">Surveillance</h3>
        <div class="list-group">
          <a class="list-group-item list-group-item-action active" href="/">Live Monitoring</a>
          <a class="list-group-item list-group-item-action" href="/logs">Intrusion Logs</a>
          <a class="list-group-item list-group-item-action" href="#">Settings</a>
        </div>
      </aside>
      <main class="col-md-9 col-lg-10 py-4 bg-black">
        <div class="row g-4">
          <div class="col-12">
            <div class="card border-0 rounded-4 shadow-lg">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h4 class="mb-0">Live Monitoring</h4>
                  <span class="badge bg-success">{{ camera_status }}</span>
                </div>
                <img src="/video_feed" class="img-fluid rounded-4 w-100 stream-frame" alt="Live video" />
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card border-0 rounded-4 shadow-sm bg-secondary-subtle text-dark">
              <div class="card-body">
                <h6 class="text-uppercase text-muted">Intrusions Today</h6>
                <h2 class="fw-bold">{{ intrusions_today }}</h2>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card border-0 rounded-4 shadow-sm bg-secondary-subtle text-dark">
              <div class="card-body">
                <h6 class="text-uppercase text-muted">Latest Recognized Person</h6>
                <h4 class="fw-bold">{{ latest_person }}</h4>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card border-0 rounded-4 shadow-sm bg-secondary-subtle text-dark">
              <div class="card-body">
                <h6 class="text-uppercase text-muted">System Status</h6>
                <h4 class="fw-bold">{{ system_status }}</h4>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
