<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intrusion Logs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/static/css/style.css" rel="stylesheet" />
</head>
<body>
  <div class="logs-shell">
    <header class="logs-topbar">
      <h4 class="mb-0">Intrusion Logs</h4>
      <nav class="dashboard-nav">
        <a class="btn btn-sm btn-outline-light" href="/">Live</a>
        <a class="btn btn-sm btn-primary" href="/logs">Intrusion Logs</a>
        <a class="btn btn-sm btn-outline-light" href="/settings">Settings</a>
      </nav>
    </header>
    <main class="logs-content">
      <div class="card border-0 rounded-4 shadow-lg">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <p class="text-muted mb-0 small">Face identification runs when logs are loaded.</p>
            <div class="d-flex gap-2 flex-wrap">
              <input id="searchInput" class="form-control" placeholder="Search by person/date" />
              <select id="filterSelect" class="form-select">
                <option value="">All</option>
                <option value="known">Known Persons</option>
                <option value="unknown">Unknown Persons</option>
                <option value="multiple">Multiple Persons</option>
              </select>
              <select id="sortSelect" class="form-select">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
              </select>
            </div>
          </div>
          <div class="table-responsive">
            <table class="table table-dark table-striped align-middle">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Captured Image</th>
                  <th>Timestamp</th>
                  <th>Recognized Persons</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="logsBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal fade" id="imageModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
      <div class="modal-content bg-dark text-white">
        <div class="modal-body">
          <img id="modalImage" class="img-fluid w-100" alt="Intrusion" />
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/logs.js"></script>
</body>
</html>
